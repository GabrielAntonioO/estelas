<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Estelas Vigo</title>
<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,sans-serif;
  text-align:center;
  padding-top:20px;
}
h2{
  margin:0 0 4px 0;
  font-size:26px;
  text-decoration:underline;
}
.linea{
  font-size:26px;
  margin:14px 0;
}
.small{
  opacity:.7;
  font-size:18px;
  margin-top:10px;
}
</style>
</head>
<body>
<h2>Estelas en Vigo</h2>
<div id="estado" class="small">Cargando...</div>
<div id="datos" style="display:none;">
  <div class="linea">12 km: <span id="l12">--</span></div>
  <div class="linea">11 km: <span id="l11">--</span></div>
  <div class="linea">10 km: <span id="l10">--</span></div>
  <br>
  <div class="small">Riesgo general: <span id="risk">--</span></div>
  <div class="small" id="hora"></div>
</div>

<script>
// Convierte RH sobre agua → RHi (sobre hielo) con Magnus
function toRHi(RHw, T_C) {
  const ew = 6.1078 * Math.exp(17.269 * T_C / (T_C + 237.29));
  const ei = 6.1078 * Math.exp(21.875 * T_C / (T_C + 265.5));
  return (RHw / 100) * (ew / ei) * 100;
}

// CPI: Schumann 1996, umbral 95% por sesgo seco ERA5
function classify(T, RHw) {
  const RHi = toRHi(RHw, T);
  if (T > -40) return "NULA";
  const ts = T <= -50 ? 3 : T <= -45 ? 2 : 1;
  const rs = RHi >= 110 ? 4 : RHi >= 100 ? 3 : RHi >= 95 ? 2 : RHi >= 90 ? 1 : 0;
  const cpi = ts + rs;
  if (cpi >= 6) return "MUY ALTA";
  if (cpi >= 5) return "ALTA";
  if (cpi >= 3) return "MEDIA";
  if (cpi >= 1) return "BAJA";
  return "NULA";
}

function riesgoGeneral(niveles) {
  for (const r of ["MUY ALTA","ALTA","MEDIA","BAJA","NULA"])
    if (niveles.includes(r)) return r;
  return "NULA";
}

// Vigo: 42.24°N, -8.72°E
const lat = 42.24;
const lon = -8.72;

const url =
  `https://api.open-meteo.com/v1/forecast`
  +`?latitude=${lat}&longitude=${lon}`
  +`&hourly=temperature_200hPa,temperature_225hPa,temperature_275hPa`
  +`,relative_humidity_200hPa,relative_humidity_225hPa,relative_humidity_275hPa`
  +`&timezone=Europe%2FMadrid&forecast_days=1`;

fetch(url)
  .then(r => r.json())
  .then(d => {
    const h = d.hourly;
    const hora = new Date().getHours();

    // 12 km (~200 hPa)
    const t12 = h.temperature_200hPa[hora], rh12 = h.relative_humidity_200hPa[hora];
    const r12 = classify(t12, rh12);

    // 11 km (~225 hPa)
    const t11 = h.temperature_225hPa[hora], rh11 = h.relative_humidity_225hPa[hora];
    const r11 = classify(t11, rh11);

    // 10 km (~275 hPa)
    const t10 = h.temperature_275hPa[hora], rh10 = h.relative_humidity_275hPa[hora];
    const r10 = classify(t10, rh10);

    document.getElementById("l12").textContent = r12;
    document.getElementById("l11").textContent = r11;
    document.getElementById("l10").textContent = r10;
    document.getElementById("risk").textContent = riesgoGeneral([r12, r11, r10]);

    const now = new Date();
    document.getElementById("hora").textContent =
      `${now.getHours().toString().padStart(2,"0")}:${now.getMinutes().toString().padStart(2,"0")}`;

    document.getElementById("estado").style.display = "none";
    document.getElementById("datos").style.display  = "block";
  })
  .catch(() => {
    document.getElementById("estado").textContent = "Error cargando datos";
  });
</script>
</body>
</html>
